<<!DOCTYPE html>
    <html lang="fr">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Connexion</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        
        <<div class="top-banner"
            style="display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 0 30px; height: 70px; background: linear-gradient(90deg, #343434 0%, #adadad 100%);">

            <button id="burger-btn" class="burger-menu-btn">&#9776;</button>

            <img src="icon.png" alt="Logo" style="height: 50px; display: block;">

            <div class="banner-tabs" id="nav-tabs">
                <a href="index.html" class="tab-link">Configurateur</a>
                <a href="help.html" class="tab-link">Aide</a>
                <a href="contact.html" class="tab-link">Support</a>
            </div>
        </div>

        <main class="container" style="margin-top: 120px; max-width: 450px;">

            <article
                style="padding: 30px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">

                <h2
                    style="text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; font-size: 20px; color: #fff;">
                    Connexion
                </h2>

                <form id="login-form">

                    <div style="margin-bottom: 15px;">
                        <label style="font-size: 12px; color: #adadad; font-weight: 600;">Email
                            <input type="email" id="email" required style="font-size: 14px; margin-top: 5px;">
                        </label>
                    </div>

                    <div style="margin-bottom: 25px;">
                        <label style="font-size: 12px; color: #adadad; font-weight: 600;">Mot de passe
                            <input type="password" id="password" required style="font-size: 14px; margin-top: 5px;">
                        </label>
                    </div>

                    <button type="submit"
                        style="width: 100%; padding: 12px; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0;">
                        Connexion
                    </button>

                </form>

                <div style="text-align: center; margin-top: 20px;">
                    <a href="register.html" role="button" class="secondary outline"
                        style="width: 100%; padding: 12px; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin: 0;">
                        Créer un compte
                    </a>
                </div>

            </article>
        </main>

        <script src="login.js"></script>
        <script src="script.js"></script>
    </body>

    </html>
