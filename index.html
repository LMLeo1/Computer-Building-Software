<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PC Build Configurator</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">

    <link rel="icon" type="image/png" href="icon.png">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section id="welcome-screen">
        <div class="top-banner">
            <p id="promo-text">Make an account to save your configurations!</p>
            <a href="login.html" id="login-link" class="login-btn">Login / Sign Up</a>
            <div id="user-status">
                <span id="welcome-message"></span>
                <button id="logout-btn" style="display:none;">Déconnexion</button>
                <div id="user-status">
                    <span id="welcome-message"></span>

                    <button id="logout-btn" style="display:none;">Déconnexion</button>
                </div>
            </div>
        </div>
        <div class="welcome-content">
            <h1>Léo's Pc Configurator</h1>
            <h2>First website project, made with HTML, CSS and JS.</h2>
            <a href="#configurator-zone" class="btn-white">
                Get Started <span class="arrow">➔</span>
            </a>
        </div>
    </section>

    <section id="configurator-zone">
        <section id="save-section" class="container">
            <hr>
            <h3>Save your configurations</h3>
            <input type="text" id="config-name" placeholder="Name your config (e.g., Gaming Pro)">

            <div id="saved-list">
                <ul id="configs-ul"></ul>
                <div id="my-saved-configs">
                    <h3>Saved configurations</h3>
                    <ul id="configs-list">
                    </ul>
                </div>
        </section>
        <main class="container">
            <form id="configurator-form">

                <label> Central Processing Unit (CPU)
                    <select id="cpu-select" required>
                        <option value="0">Select a CPU...</option>
                    </select>
                </label>
                <label> Random Access Memory (RAM)
                    <select id="ram-select" required>
                        <option value="0">Select RAM...</option>
                    </select>
                </label>

                <label> Motherboard
                    <select id="mb-select" required>
                        <option value="0">Select a Motherboard...</option>
                    </select>
                </label>

                <label> Graphics Card (GPU)
                    <select id="gpu-select" required>
                        <option value="0">Select a GPU...</option>
                    </select>
                </label>

                <label> Alimentations (PSU)
                    <select id="psu-select" required>
                        <option value="0">Select a PSU...</option>
                    </select>
                </label>
                <button id="save-config-btn">Save my configuration</button>
                <form id="configurator-form">
                    <div class="footer-actions">
                        <button type="button" id="calc-btn">Calculate Total</button>
                        <div id="price-box">
                            <span id="total-label">Total:</span>
                            <span id="total-display">0€</span>
                        </div>
                    </div>
                </form>
                <div id="image-container">
                </div>
                </div>
                <a href="contact.html">Dm me if you find bugs</a>
            </form>
        </main>
        <script src="script.js"></script>
    </section>
</body>

</html>
