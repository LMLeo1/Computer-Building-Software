<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PC Build Configurator</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">

    <link rel="icon" type="image/png" href="icon.png">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section id="welcome-screen">
        <div class="welcome-content">
            <h1>Léo's PC Build Configurator</h1>
            <h2>First website project, made with HTML, CSS and JS.</h2>

            <a href="#configurator-zone" class="btn-white">
                Get Started <span class="arrow">➔</span>
            </a>
        </div>
    </section>

    <section id="configurator-zone">
        <section id="save-section" class="container">
            <hr>
            <h3>Save your configuration</h3>
            <input type="text" id="config-name" placeholder="Name your config (e.g., Gaming Pro)">
            <button id="save-btn" type="button">Save</button>
            <button id="delete-btn" type="button">Delete all</button>

            <div id="saved-list">
                <h4>My configurations :</h4>
                <ul id="configs-ul"></ul>
            </div>
        </section>
        <main class="container">
            <form id="configurator-form">

                <label> Central Processing Unit (CPU)
                    <select id="cpu-select" required>
                        <option value="0">Select a CPU...</option>

                        <option value="300" data-socket="intel">Intel Core i5-14600K (300€)</option>
                        <option value="350" data-socket="intel">Intel Core i7-13700K (350€)</option>
                        <option value="400" data-socket="intel">Intel Core i7-14700K (400€)</option>
                        <option value="390" data-socket="intel">Intel Core Ultra 7 265K (390€)</option>
                        <option value="550" data-socket="intel">Intel Core i9-14900K (550€)</option>

                        <option value="220" data-socket="amd">AMD Ryzen 5 7600X (220€)</option>
                        <option value="370" data-socket="amd">AMD Ryzen 7 7800X3D (370€)</option>
                        <option value="480" data-socket="amd">AMD Ryzen 7 9800X3D (480€)</option>
                        <option value="450" data-socket="amd">AMD Ryzen 9 7950X (450€)</option>
                        <option value="650" data-socket="amd">AMD Ryzen 9 9950X (650€)</option>
                    </select>
                </label>

                <label> Motherboard
                    <select id="mb-select" required>
                        <option value="">Select a Motherboard...</option>

                        <option value="150" data-socket="intel">ASUS Prime B760M-K (150€)</option>
                        <option value="180" data-socket="intel">MSI MAG B760 Tomahawk (180€)</option>
                        <option value="200" data-socket="intel">ASUS Prime Z790-P (200€)</option>
                        <option value="260" data-socket="intel">Gigabyte Z790 Aorus Elite (260€)</option>
                        <option value="320" data-socket="intel">MSI MPG Z790 Edge WiFi (320€)</option>
                        <option value="380" data-socket="intel">ASUS ROG Strix Z790-F (380€)</option>

                        <option value="140" data-socket="amd">ASUS Prime A620M-A (140€)</option>
                        <option value="160" data-socket="amd">ASUS Prime B650M-A (160€)</option>
                        <option value="210" data-socket="amd">MSI MAG B650 Tomahawk (210€)</option>
                        <option value="230" data-socket="amd">Gigabyte B650 Aorus Elite (230€)</option>
                        <option value="290" data-socket="amd">MSI MPG X670E Carbon (290€)</option>
                        <option value="420" data-socket="amd">ASUS ROG Strix X670E-F (420€)</option>
                    </select>
                </label>

                <label> Graphics Card (GPU)
                    <select id="gpu-select" required>
                        <option value="0">Select a GPU...</option>
                        <option value="1999">NVIDIA RTX 5090 (1999€)</option>
                        <option value="999">NVIDIA RTX 5080 (999€)</option>
                        <option value="549">NVIDIA RTX 5070 (549€)</option>
                        <option value="549">NVIDIA RTX 5070 Ti (549€)</option>
                        <option value="300">NVIDIA RTX 5060 (300€)</option>
                        <option value="549">NVIDIA RTX 4070 Super (549€)</option>
                        <option value="1050">NVIDIA RTX 4080 Super (1050€)</option>
                    </select>
                </label>

                <label> Alimentations (PSU)
                    <select id="psu-select" required>
                        <option value="0">Select a PSU...</option>
                        <option value="150">Corsair RM850x (150€)</option>
                        <option value="100">Be Quiet (100€)</option>
                    </select>
                </label>
                <form id="configurator-form">
                    <div class="footer-actions">
                        <button type="button" id="calc-btn">Calculate Total</button>
                        <div id="price-box">
                            <span id="total-label">Total:</span>
                            <span id="total-display">0€</span>
                        </div>
                    </div>
                </form>
                <div id="image-container">

                </div>
            </form>
        </main>
        <script src="motherboard-data.js"></script>
        <script src="gpu-data.js"></script>
        <script src="cpu-data.js"></script>
        <script src="script.js"></script>
    </section>
</body>

</html>
