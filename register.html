<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

 <body>
    <div class="top-banner"
            style="display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 0 30px; height: 70px; background: linear-gradient(90deg, #343434 0%, #adadad 100%);">

            <button id="burger-btn" class="burger-menu-btn">&#9776;</button>

            <img src="icon.png" alt="Logo" style="height: 50px; display: block;">

            <div class="banner-tabs" id="nav-tabs">
                <a href="index.html" class="tab-link">Configurateur</a>
                <a href="help.html" class="tab-link">Aide</a>
                <a href="contact.html" class="tab-link">Support</a>
            </div>

    <div style="display: flex; align-items: center; gap: 15px;">
        <span id="welcome-message" style="margin: 0; font-size: 14px;"></span>
        <a href="login.html" id="login-link" class="login-btn" style="margin: 0;">Connection</a>
        <button id="logout-btn" style="display: none; width: auto !important; margin: 0; padding: 5px 20px;">Déconnexion</button>
    </div>
    </div>

    <main class="container" style="margin-top: 120px; max-width: 450px;">
        
        <article style="padding: 30px; box-shadow: 0 8px 24px rgba(255, 255, 255, 0.3); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
            
            <header style="text-align: center; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;">
                <h2 style="margin: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; color: #fff;">
                    Créer un compte
                </h2>
                <p style="font-size: 12px; opacity: 0.7; margin-top: 5px; margin-bottom: 0;">
                    Inscris-toi pour sauvegarder tes configurations hardware
                </p>
            </header>

            <form id="register-form">
                
                <div style="margin-bottom: 15px;">
                    <label for="username" style="font-size: 12px; color: #adadad; font-weight: 600;">Nom d'utilisateur</label>
                    <input type="text" id="username" placeholder="Nom d'utilisateur" required style="font-size: 14px; margin-top: 5px;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label for="email" style="font-size: 12px; color: #adadad; font-weight: 600;">Email</label>
                    <input type="email" id="email" placeholder="Email" required style="font-size: 14px; margin-top: 5px;">
                </div>

                <div style="margin-bottom: 25px;">
                    <label for="password" style="font-size: 12px; color: #adadad; font-weight: 600;">Mot de passe</label>
                    <input type="password" id="password" placeholder="Mot de passe" required style="font-size: 14px; margin-top: 5px;">
                </div>

                <button type="submit" style="width: 100%; padding: 12px; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;">
                    Créer un compte
                </button>
                
                <script src="register.js"></script>
            </form>

        </article>
    </main>

    <script src="script.js"></script>
</body>

</html>
